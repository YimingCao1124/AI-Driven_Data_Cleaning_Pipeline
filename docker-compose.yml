services:
  api:
    build:
      context: ./apps/api
    container_name: ai-data-extraction-api
    ports:
      - "8000:8000"
    environment:
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      MODEL_NAME: ${MODEL_NAME:-mock-extractor}
      MAX_RETRIES: ${MAX_RETRIES:-2}
      TEMPERATURE: ${TEMPERATURE:-0}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-3}
      DATABASE_URL: sqlite:////app/data/app.db
      UPLOAD_DIR: /app/storage/uploads
      EXPORT_DIR: /app/storage/exports
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    container_name: ai-data-extraction-web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    restart: unless-stopped
